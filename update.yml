name: Daily NBA Injury Update

on:
  schedule:
    # 每天 UTC 时间 8:00 运行，对应北京时间 16:00
    - cron: '0 8 * * *'
  workflow_dispatch:  # 允许手动触发，方便测试

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 稍后使用个人令牌

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run update script
        run: python update.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update injury report $(date +'%Y-%m-%d')"
          git push
          